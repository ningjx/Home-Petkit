name: 💡 功能请求
description: 提出一个新功能建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！

  - type: textarea
    id: feature
    attributes:
      label: 功能描述
      description: 清晰描述你想要的功能
      placeholder: "我希望能够..."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 为什么需要这个功能？
      description: 描述这个功能如何帮助到你
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 可能的实现方案
      description: 如果你有想法，可以描述一下可能的实现方式