name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"

  release:
    runs-on: "ubuntu-latest"
    needs: validate-hacs
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: |
          cd custom_components/petkit_feeder
          zip -r ../../petkit_feeder.zip .
          cd ../..

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: petkit_feeder.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}